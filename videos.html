<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon</title>

    <!-- Google Fonts: Lexend -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- INTERNAL CSS -->
    <style>

        body {
            margin: 0;
            font-family: "Lexend", sans-serif;
            background: #f2f2f2;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            width: 100%;
            height: 50px;
            background: #ffffff;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            position: relative;
            gap: 28px;
            margin-right: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            padding: 6px 4px;
            cursor: pointer;
        }

        .nav-links a.active {
            color: #1e90ff;
        }

        /* Sliding Indicator */
        .nav-indicator {
            position: absolute;
            bottom: -1px;
            height: 3px;
            background: #1e90ff;
            border-radius: 3px;
            transition: all 0.35s ease;
        }

        /* ---------- SEARCH BAR ---------- */
        .search-area {
            display: flex;
            align-items: center;
            background: #e6e6e6;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            margin-left: 8px;
        }

        /* ---------- PAGE LAYOUT ---------- */
        .container {
            display: flex;
            width: 100%;
            margin-top: 20px;
        }

        .left-panel {
            width: 18%;
            min-width: 200px;
            background: #b5cedb;
            height: calc(100vh - 70px);
        }

        .main-content {
            padding: 30px;
            width: 82%;
            box-sizing: border-box;
        }

        .module-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Center Video Box */
        .video-wrapper {
            width: 100%;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-box {
            width: 90%;
            height: 250px;
            background: #b5cedb;
            border-radius: 6px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .description-text {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            max-width: 75%;
        }

    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-links">
            <a class="nav-item" href="index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a class="nav-item" href="library.html">Library</a>
            <a class="nav-item" href="quizzes.html">Quizzes</a>
            <a class="nav-item active" href="videos.html">Videos</a>
            <a class="nav-item" href="meetings.html">Meetings</a>

            <!-- INDICATOR -->
            <div class="nav-indicator"></div>
        </div>

        <div class="search-area">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search">
        </div>
    </div>

    <div class="container">

        <div class="left-panel"></div>

        <div class="main-content">

            <div class="module-title">MODULE | ##.##</div>

            <div class="video-wrapper">
                <div class="video-box"></div>
            </div>

            <div class="section-label">DESCRIPTION</div>
            <p class="description-text">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec aliquam lectus 
                ut commodo faucibus. Fusce maximus dolor eu mattis convallis accumsan.
            </p>
        </div>

    </div>

    <!-- INTERNAL JS FOR NAV INDICATOR -->
    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const indicator = document.querySelector('.nav-indicator');

        function moveIndicator(item) {
            const rect = item.getBoundingClientRect();
            const parentRect = item.parentElement.getBoundingClientRect();
            const left = rect.left - parentRect.left;

            indicator.style.width = `${rect.width}px`;
            indicator.style.transform = `translateX(${left}px)`;
        }

        // Initialize on active element
        const activeItem = document.querySelector('.nav-item.active');
        moveIndicator(activeItem);

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                document.querySelector('.nav-item.active')?.classList.remove('active');
                item.classList.add('active');
                moveIndicator(item);
            });
        });
    </script>

</body>
</html>
