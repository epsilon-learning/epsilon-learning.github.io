<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Epsilon — Quizzes</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{ --black:#000000; --dark:#1E1E1E; --blue:#00AAFF; --panel:#B8D3DD; --white:#FFFFFF; --bg:#F2F2F2; --muted:#444; }
    *{box-sizing:border-box}
    body{ margin:0; font-family:"Lexend",sans-serif; background:var(--bg); color:var(--black); }

    .navbar{ width:100%; height:58px; background:var(--white); border-bottom:1px solid rgba(0,0,0,0.06); display:flex; align-items:center; padding:0 20px; }
    .nav-links{ display:flex; gap:28px; align-items:center; position:relative; margin-right:auto; }
    .nav-item{ text-decoration:none; color:var(--dark); font-weight:500; padding:8px 4px; cursor:pointer; white-space:nowrap; }
    .nav-item.active{ color:var(--blue); }
    .nav-indicator{ position:absolute; bottom:-1px; height:4px; background:var(--blue); border-radius:4px; transition:all .32s cubic-bezier(.2,.9,.2,1); }

    .search-area{ display:flex; align-items:center; gap:10px; background: rgba(0,0,0,0.04); padding:6px 12px; border-radius:20px; }
    .search-area input{ border:0; outline:0; background:transparent; font-size:14px; width:160px; }

    .container{ display:flex; width:100%; gap:0; padding:22px 30px; }
    .left-panel{ width:220px; min-width:160px; background:var(--dark); color:var(--white); border-radius:8px; height:calc(100vh - 110px); padding:18px; }
    .main-content{ flex:1; padding:6px 30px; }
    .module-title{ font-size:16px; font-weight:600; margin-bottom:12px; }
    .quiz-list{ display:flex; flex-direction:column; gap:12px; }
    .quiz-card{ background:var(--white); padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(10,10,20,0.04); display:flex; justify-content:space-between; align-items:center; }
    .btn{ background:var(--blue); color:var(--white); border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600; }

    @media (max-width:900px){ .container{ padding:12px; flex-direction:column; } .left-panel{ width:100%; height:auto; order:2; } .main-content{ order:1; padding:12px 0; } }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="nav-links">
      <a class="nav-item" href="index.html"><i class="fa-solid fa-house"></i>&nbsp; Home</a>
      <a class="nav-item" href="library.html">Library</a>
      <a class="nav-item active" href="quizzes.html">Quizzes</a>
      <a class="nav-item" href="videos.html">Videos</a>
      <a class="nav-item" href="meetings.html">Meetings</a>
      <div class="nav-indicator no-animate"></div>

    </div>

    <div class="search-area">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input placeholder="Search quizzes" />
    </div>
  </div>

  <div class="container">
    <aside class="left-panel">
      <div style="font-weight:700;font-size:20px">Epsilon</div>
      <div style="margin-top:12px;color:var(--panel)">Quizzes</div>
      <hr style="opacity:.06;margin:16px 0">
      <div style="color:var(--white);font-size:13px">Filters</div>
      <div style="margin-top:8px;color:var(--panel)">By Unit • By Difficulty</div>
    </aside>

    <main class="main-content">
      <div class="module-title">Quizzes</div>

      <div class="quiz-list">
        <div class="quiz-card">
          <div>
            <div style="font-weight:600">Quiz 1 — Cells</div>
            <div style="font-size:13px;color:var(--muted)">10 multiple-choice questions</div>
          </div>
          <button class="btn" onclick="startDemoQuiz()">Start</button>
        </div>

        <div class="quiz-card">
          <div><div style="font-weight:600">Quiz 2 — Genetics</div><div style="font-size:13px;color:var(--muted)">10 MCQs</div></div>
          <button class="btn" onclick="startDemoQuiz()">Start</button>
        </div>

        <div class="quiz-card">
          <div><div style="font-weight:600">Quiz 3 — Ecology</div><div style="font-size:13px;color:var(--muted)">8 MCQs</div></div>
          <button class="btn" onclick="startDemoQuiz()">Start</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function(){
      const items = document.querySelectorAll('.nav-item');
      const indicator = document.querySelector('.nav-indicator');
      function move(el){ if(!el) return; const r=el.getBoundingClientRect(), p=el.parentElement.getBoundingClientRect(); indicator.style.width=Math.round(r.width)+'px'; indicator.style.transform='translateX('+Math.round(r.left-p.left)+'px)'; }
      window.addEventListener('load', ()=> move(document.querySelector('.nav-item.active')));
      items.forEach(it=> it.addEventListener('click', ()=>{ document.querySelector('.nav-item.active')?.classList.remove('active'); it.classList.add('active'); move(it); }));
      window.addEventListener('resize', ()=> move(document.querySelector('.nav-item.active')));
    })();

    // simple demo function for Start
    function startDemoQuiz(){
      alert('Quiz starting (demo). For the competition, implement quiz interactivity or present a mockup.');
    }
  </script>
</body>
</html>
