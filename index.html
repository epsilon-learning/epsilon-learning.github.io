<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon – Home</title>

    <!-- Google Fonts: Lexend -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: "Lexend", sans-serif;
            background: #f2f2f2;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            height: 50px;
            background: #ffffff;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            position: relative;
            gap: 28px;
            margin-right: auto;
        }

        .nav-item {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            padding: 6px 4px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #1e90ff;
        }

        .nav-indicator {
            position: absolute;
            bottom: -1px;
            height: 3px;
            background: #1e90ff;
            border-radius: 3px;
            transition: all 0.35s ease;
        }

        /* SEARCH BAR */
        .search-area {
            display: flex;
            align-items: center;
            background: #e6e6e6;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            margin-left: 8px;
        }

        /* PAGE LAYOUT */
        .content {
            padding: 40px;
        }
    </style>
</head>

<body>

    <!-- HEADER / NAVBAR -->
    <div class="navbar">
        <div class="nav-links">
            <a class="nav-item active" href="index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a class="nav-item" href="library.html">Library</a>
            <a class="nav-item" href="quizzes.html">Quizzes</a>
            <a class="nav-item" href="videos.html">Videos</a>
            <a class="nav-item" href="meetings.html">Meetings</a>

            <div class="nav-indicator"></div>
        </div>

        <div class="search-area">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search">
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
        <h1>Welcome to Epsilon</h1>
        <p>This is the homepage.</p>
    </div>

    <script>
        const items = document.querySelectorAll('.nav-item');
        const indicator = document.querySelector('.nav-indicator');

        function moveIndicator(item) {
            const rect = item.getBoundingClientRect();
            const parent = item.parentElement.getBoundingClientRect();
            const left = rect.left - parent.left;
            indicator.style.width = `${rect.width}px`;
            indicator.style.transform = `translateX(${left}px)`;
        }

        moveIndicator(document.querySelector('.nav-item.active'));

        items.forEach(i => {
            i.addEventListener('click', () => {
                document.querySelector('.nav-item.active')?.classList.remove('active');
                i.classList.add('active');
                moveIndicator(i);
            });
        });
    </script>

</body>
</html>
